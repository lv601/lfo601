name: Build Windows VST3

on:
  workflow_dispatch:
  push:
    branches: [ main, master, version-2.0 ]

# GitHub is migrating JavaScript actions from Node 20 to Node 24.
# This opts in early and removes the Node 20 deprecation warning for actions
# such as actions/checkout@v4 on runners where Node 24 is available.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-vst3:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build VST3
        run: cmake --build build --config Release --target LFOzTool_VST3

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: LFOz-Tool-Windows-VST3
          path: build/LFOzTool_artefacts/Release/VST3/**/*.vst3
